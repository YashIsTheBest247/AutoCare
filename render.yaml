services:
  - type: web
    name: autocare-api
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@autocare.ai
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: autocare-db
          property: connectionString

databases:
  - name: autocare-db
    plan: free
